<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="#0b162a"/>

  <!-- Crossed hockey sticks -->
  <g stroke="#21d19f" stroke-width="18" stroke-linecap="round" fill="none">
    <!-- Left stick shaft -->
    <line x1="148" y1="120" x2="310" y2="360"/>
    <!-- Left stick blade -->
    <path d="M310 360 Q320 380 350 385" stroke-width="22"/>

    <!-- Right stick shaft -->
    <line x1="364" y1="120" x2="202" y2="360"/>
    <!-- Right stick blade -->
    <path d="M202 360 Q192 380 162 385" stroke-width="22"/>
  </g>

  <!-- Tape wraps on stick handles -->
  <g stroke="#2980b9" stroke-width="5" stroke-linecap="round" opacity="0.6">
    <line x1="160" y1="140" x2="170" y2="150"/>
    <line x1="166" y1="152" x2="176" y2="162"/>
    <line x1="352" y1="140" x2="342" y2="150"/>
    <line x1="346" y1="152" x2="336" y2="162"/>
  </g>

  <!-- Hockey puck -->
  <ellipse cx="256" cy="290" rx="52" ry="16" fill="#21d19f" opacity="0.15"/>
  <ellipse cx="256" cy="280" rx="52" ry="16" fill="#1a253a" stroke="#21d19f" stroke-width="4"/>
  <rect x="204" y="264" width="104" height="16" fill="#1a253a"/>
  <ellipse cx="256" cy="264" rx="52" ry="16" fill="#21d19f"/>
  <!-- Puck shine -->
  <ellipse cx="244" cy="262" rx="20" ry="6" fill="#2ee8b2" opacity="0.35"/>

  <!-- Accent ring / crest outline -->
  <circle cx="256" cy="256" r="180" fill="none" stroke="#21d19f" stroke-width="6" opacity="0.18"/>
  <circle cx="256" cy="256" r="196" fill="none" stroke="#2980b9" stroke-width="2" opacity="0.12"/>

  <!-- Small star accent at top -->
  <polygon points="256,62 261,76 276,76 264,84 268,98 256,90 244,98 248,84 236,76 251,76"
           fill="#21d19f" opacity="0.7"/>
</svg>
